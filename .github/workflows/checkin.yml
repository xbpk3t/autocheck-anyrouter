name: AnyRouter 自动签到
on:
  schedule:
    - cron: 12 7 * * *
  workflow_dispatch: null
jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: production
    env:
      PYTHONIOENCODING: utf-8
      REPO_VISIBILITY: ${{ github.event.repository.visibility }}
      TZ: ${{ secrets.TZ }}
      TIMESTAMP_FORMAT: ${{ secrets.TIMESTAMP_FORMAT }}
      ANYROUTER_ACCOUNTS: ${{ secrets.ANYROUTER_ACCOUNTS }}
      SHOW_SENSITIVE_INFO: ${{ secrets.SHOW_SENSITIVE_INFO }}
      DINGTALK_NOTIF_CONFIG: ${{ secrets.DINGTALK_NOTIF_CONFIG }}
      EMAIL_NOTIF_CONFIG: ${{ secrets.EMAIL_NOTIF_CONFIG }}
      PUSHPLUS_NOTIF_CONFIG: ${{ secrets.PUSHPLUS_NOTIF_CONFIG }}
      SERVERPUSH_NOTIF_CONFIG: ${{ secrets.SERVERPUSH_NOTIF_CONFIG }}
      FEISHU_NOTIF_CONFIG: ${{ secrets.FEISHU_NOTIF_CONFIG }}
      WECOM_NOTIF_CONFIG: ${{ secrets.WECOM_NOTIF_CONFIG }}
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.CRON_PAT }}
      - name: 🔑 加载账号配置
        uses: oNaiPs/secrets-to-env-action@v1.8
        with:
          secrets: ${{ toJSON(secrets) }}
          include: ANYROUTER_ACCOUNT_*
      - name: 🔧 安装 Mise
        uses: jdx/mise-action@a0eaf7aa03d8c15f7e32f71429266c3d5d3cb442
        with:
          cache_key: "{{default}}-${{ hashFiles('pyproject.toml') }}"
      - name: ⚙️ 安装依赖
        run: mise run install
      - name: 🎭 配置 Playwright 环境
        uses: ./.github/actions/setup-playwright
        id: playwright-setup
      - name: 💾 恢复余额历史缓存
        uses: actions/cache@v5
        with:
          path: balance_hash.txt
          key: balance-hash-${{ github.run_id }}
          restore-keys: |
            balance-hash-
      - name: 🚀 执行签到任务
        run: mise run checkin
      - name: 🎲 随机化下次 cron
        id: next-cron
        run: |
          MINUTE=$(( RANDOM % 60 ))
          HOUR=$(( RANDOM % 24 ))
          echo "cron=$MINUTE $HOUR * * *" >> "$GITHUB_OUTPUT"
          echo "下次执行: $(printf '%02d' $HOUR):$(printf '%02d' $MINUTE) UTC"
      - name: 📝 更新定时
        uses: gr2m/set-cron-schedule-action@v2
        with:
          token: ${{ secrets.CRON_PAT }}
          cron: ${{ steps.next-cron.outputs.cron }}
          workflow: checkin.yml
          message: "chore: randomize next cron schedule"
